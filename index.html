<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTVVI</title>

    <meta property="og:type" content="website">
    <meta property="og:title" content="HTVVI">
    <meta property="og:description" content="방송일정 & 노래책">
    <meta property="og:image" content="https://i.postimg.cc/qRD2Q4Jx/jemog-eul-iblyeoghaejuseyo.png">
    <meta property="og:url" content="https://htvvicalendar.vercel.app/">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="HTVVI">
    <meta name="twitter:description" content="방송일정 & 노래책">
    <meta name="twitter:image" content="https://i.postimg.cc/qRD2Q4Jx/jemog-eul-iblyeoghaejuseyo.png">

    <link rel="shortcut icon" href="https://i.postimg.cc/Xqx5y0Hn/Honeycam-export-2026-05-22-19-04-04.png" />
    <link rel="icon" href="https://i.postimg.cc/qRD2Q4Jx/jemog-eul-iblyeoghaejuseyo.png" type="image/png">
    <link rel="icon" type="image/png" sizes="192x192" href="https://i.postimg.cc/qRD2Q4Jx/jemog-eul-iblyeoghaejuseyo.png">
    <link rel="apple-touch-icon" sizes="180x180" href="https://i.postimg.cc/qRD2Q4Jx/jemog-eul-iblyeoghaejuseyo.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FFFDF0">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    
    <link rel="stylesheet" href="style.css?v=20260528">
</head>
<body id="mainBody">

    <div id="loadingOverlay" class="loading-overlay">
        <div class="cute-loading-text">
            <span>L</span><span>O</span><span>A</span><span>D</span><span>I</span><span>N</span><span>G</span>
        </div>
    </div>

    <header class="main-header">
        <div class="header-left">
            <nav class="top-tabs">
                <button type="button" class="tab-button active" data-tab="schedule" onclick="showTab('schedule')">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px;"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                    일정
                </button>
                <button type="button" class="tab-button" data-tab="songbook" onclick="showTab('songbook')">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px;"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>
                    노래책
                </button>
            </nav>
        </div>
        
        <div class="header-center">
            <a href="https://www.sooplive.com/station/htvv2i" target="_blank" rel="noopener noreferrer" class="logo-link">
                <img src="https://i.postimg.cc/2yGbBGtT/logo.png" alt="HTVVI Logo" class="main-logo" onerror="this.style.display='none'; document.getElementById('fallbackLogo').style.display='block';">
                <div id="fallbackLogo" class="fallback-logo">htvvi</div>
            </a>
        </div>

        <div class="header-right">
            <div id="todaySchedulePanel" class="today-summary">
                <h4 class="font-black text-xl mb-4 flex items-center gap-2">
                    <span class="w-2 h-5 bg-amber-400 rounded-full"></span>오늘 일정
                </h4>
                <div id="summaryContent"></div>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="calendar-top">
            <div class="calendar-header mt-2">
                <div class="calendar-header-top">
                    <div class="calendar-header-title">
                        <button class="nav-btn" onclick="moveMonth(-1)">◀</button>
                        <h2 id="monthDisplay" class="text-4xl font-black cursor-pointer hover:text-amber-400 transition-colors text-center select-none" style="min-width: 240px;" title="월 선택" onclick="openMonthPicker()"></h2>
                        <button class="nav-btn" onclick="moveMonth(1)">▶</button>
                    </div>
                    <button class="memo-btn" title="메모장 열기/닫기" onclick="toggleMemo()">
                        <svg viewBox="0 0 24 24" width="20" fill="currentColor"><path d="M14,2H6C4.9,2,4.01,2.9,4.01,4L4,20c0,1.1,0.89,2,1.99,2H18c1.1,0,2-0.9,2-2V8L14,2z M18,20H6V4h7v5h5V20z"/></svg>
                        <span>MEMO</span>
                    </button>
                </div>
            </div>
        </div>

        <div class="calendar-body">
            <div id="calendarMain" class="calendar-main">
                <div class="calendar-grid" id="calendarGrid"></div>
            </div>
            
            <div id="memoPanel" class="memo-panel-container">
                <div class="memo-panel-header">
                    <div class="memo-tabs">
                        <button class="memo-tab memo-tab-active" data-tab="컨텐츠" onclick="selectMemoTab('컨텐츠')">컨텐츠</button>
                        <button class="memo-tab" data-tab="LCK" onclick="selectMemoTab('LCK')">LCK</button>
                        <button class="memo-tab" data-tab="시네티" onclick="selectMemoTab('시네티')">시네티</button>
                    </div>
                    <button id="memoAddBtn" class="memo-add-button admin-only-btn" onclick="openMemoInput()">+</button>
                </div>
                <div id="memoInputArea" class="memo-input-area hidden">
                    <div style="display: flex; gap: 10px; width: 100%;">
                        <input type="date" id="memoDateInput" class="admin-input" style="flex: 1; padding: 10px; font-size: 14px;" title="일정 날짜">
                        <input type="time" id="memoTimeInput" class="admin-input" style="flex: 1; padding: 10px; font-size: 14px;" title="일정 시간">
                    </div>
                    <textarea id="memoItemText" class="memo-item-input" placeholder="메모 내용을 입력하세요"></textarea>
                    <div class="memo-input-actions">
                        <button class="btn btn-cancel" onclick="closeMemoInput()">취소</button>
                        <button class="btn btn-save" onclick="saveMemoItem()">추가하기</button>
                    </div>
                </div>
                <div id="memoList" class="memo-list"></div>
            </div>
        </div>

        <div id="songbookSection" class="songbook-section">
            <div id="songbookLoading" class="songbook-loading hidden">
                <div class="equalizer-loader">
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                </div>
                <div style="font-weight: 900; color: var(--text-dark); font-size: 20px;">노래책을 펼치는 중...</div>
            </div>

            <div class="songbook-sidebar">
                
                <div id="favoritePlayerPanel" class="fav-player-panel is-minimized">
                    <button id="mobilePlayerCloseBtn" class="mobile-player-close" onclick="toggleMobilePlayer()" title="닫기">
                        <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="6 9 12 15 18 9"></polyline>
                        </svg>
                    </button>
                    <div class="music-note-btn" onclick="toggleMinimize()" style="cursor: pointer; text-align: center; font-size: 24px; display: none;">🎵</div>
                    <div id="panelContent">
                        <h4 class="font-black text-xl mb-4 flex items-center gap-2">
                            플레이어
                        </h4>
                        <div id="playerWrapper" style="width: 100%; aspect-ratio: 16 / 9; background: #000; border-radius: 12px; margin-bottom: 10px; overflow: hidden; display: none;"></div>

                        <div class="track-info" id="playerTrackTitle">재생할 곡이 없습니다</div>
                        <div class="track-artist" id="playerTrackArtist">곡을 선택해주세요.</div>

                        <div id="visualizer" class="wave-container" style="display: none;">
                            <div class="wave"></div>
                        </div>

                        <div class="player-controls" style="position: relative; margin-top: 15px; height: 50px;">
                            <button class="ctrl-btn" id="btnMin" onclick="toggleScreen()" title="화면 켜기/끄기">
                                <svg id="iconMin" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="3">
                                    <line x1="5" y1="12" x2="19" y2="12"></line>
                                </svg>
                            </button>
                            <button class="ctrl-btn" onclick="prevFavSong()">⏮</button>
                            <button class="ctrl-btn play-btn" id="playPauseBtn" onclick="toggleFavPlay()">▶</button>
                            <button class="ctrl-btn" onclick="nextFavSong()">⏭</button>
                        </div>
                    </div>
                </div>

                <div class="artist-list-wrapper">
                    <div class="artist-grid" id="artistList"></div>
                </div>
            </div>

            <div class="songbook-main-content">
                <div class="songbook-header">
                    <button id="favFilterBtn" class="artist-btn" onclick="setSongbookFilter('Favorites')" type="button" title="즐겨찾기">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M10.788 3.21c.448-1.077 1.976-1.077 2.424 0l2.082 5.007 5.404.433c1.164.093 1.636 1.545.749 2.305l-4.117 3.527 1.257 5.273c.271 1.136-.964 2.033-1.96 1.425L12 18.354 7.373 21.18c-.996.608-2.231-.29-1.96-1.425l1.257-5.273-4.117-3.527c-.887-.76-.415-2.212.749-2.305l5.404-.433 2.082-5.006z" /></svg>
                    </button>
                    <input id="songbookSearch" class="songbook-search" type="text" placeholder="노래 제목 또는 가수를 검색하세요" oninput="renderSongbook()">
                    <button id="songbookAddBtn" class="add-song-btn" type="button" onclick="document.getElementById('adminSongForm').classList.add('visible'); document.getElementById('newSongTitle').focus();">+</button>
                </div>
                <div id="adminSongForm" class="admin-song-form">
                    <div class="admin-form-row">
                        <input id="newSongTitle" class="admin-input" type="text" placeholder="노래 제목">
                        <input id="newSongArtist" class="admin-input" type="text" placeholder="가수명">
                        <input id="newSongUrl" class="admin-input" type="text" placeholder="유튜브 또는 링크 주소 (선택)">
                        <label style="display: flex; align-items: center; gap: 8px; font-weight: 700; color: var(--text-dark); padding: 4px 8px; cursor: pointer;">
                            <input type="checkbox" id="isConditionSong" style="width: 18px; height: 18px; accent-color: #F48FB1; cursor: pointer;">
                            컨디션곡 (목 상태에 따라 부르는 곡)
                        </label>
                    </div>
                    <div style="display: flex; gap: 12px; margin-bottom: 16px;">
                        <button class="admin-add-btn" type="button" onclick="addSong()" id="addSongBtn">노래 추가</button>
                        <button class="admin-add-btn" type="button" onclick="cancelEdit()" style="background: #e5e7eb; color: #6b7280;">취소</button>
                    </div>
                </div>

                <div id="songList" class="songbook-content"></div>
            </div>
        </div>

        <div id="browserModal" class="songbook-modal">
            <div class="browser-container">
                <div class="browser-header">
                    <span id="browserTitle" style="font-weight: 800; color: #4E4942;">HTVVI 브라우저</span>
                    <button class="close-browser" onclick="closeBrowser()">닫기</button>
                </div>
                <div class="browser-content-wrapper">
                    <iframe id="browserIframe" class="browser-iframe" allow="autoplay; clipboard-write; web-share;" allowfullscreen="true"></iframe>
                </div>
                <div class="browser-footer">
                    <button id="modalFavoriteBtn" class="modal-favorite-btn" onclick="toggleModalFavorite()">☆ 즐겨찾기 추가</button>
                </div>
            </div>
        </div>
    </div>

    <div class="site-admin-actions">
        <button id="memberManagerBtn" class="icon-circle-btn admin-only-btn" title="멤버 관리" onclick="openMemberManager()">
            <svg viewBox="0 0 24 24" width="26" style="fill: #4E4942;"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5s-3 1.34-3 3 1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
        </button>
        <button id="adminBtn" class="icon-circle-btn" title="관리자 모드" onclick="promptAdmin()">
            <svg viewBox="0 0 24 24" width="26" style="fill: #4E4942;"><path d="M12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6zM19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.21.07-.47-.12-.61l-2.01-1.58z"/></svg>
        </button>
    </div>

    <div id="eventModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle" class="modal-title">일정 관리</h2>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editIndex">
                <input type="hidden" id="editingEventDocId">
                <div class="form-group"><label>제목</label><input type="text" id="eventTitle" placeholder="일정 제목을 입력하세요"></div>
                <div class="form-group">
                    <label>일정 기간</label>
                    <div style="display: flex; gap: 10px; align-items: center;">
                        <input type="date" id="eventStartDate" class="w-full p-[15px] rounded-[var(--radius-md)] border-2 border-[#F5F5F5] bg-[#F9F9F9]">
                        <span>~</span>
                        <input type="date" id="eventEndDate" class="w-full p-[15px] rounded-[var(--radius-md)] border-2 border-[#F5F5F5] bg-[#F9F9F9]">
                    </div>
                </div>
                <div class="form-group">
                    <label>시간 설정</label>
                    <div class="custom-time-picker">
                        <div class="ampm-toggle">
                            <button type="button" id="ampmAM" class="ampm-btn" onclick="setAMPM('오전')">오전</button>
                            <button type="button" id="ampmPM" class="ampm-btn" onclick="setAMPM('오후')">오후</button>
                        </div>
                        <div class="time-input-container">
                            <div class="time-field">
                                <span>시 (1~12)</span>
                                <input type="number" id="timeHour" min="1" max="12" placeholder="12">
                            </div>
                            <span class="time-colon">:</span>
                            <div class="time-field">
                                <span>분 (0~59)</span>
                                <input type="number" id="timeMin" min="0" max="59" placeholder="00">
                            </div>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label>유형</label>
                    <select id="eventType">
                        <option value="개인방송">개인방송</option>
                        <option value="합방">합방</option>
                        <option value="휴방">휴방</option>
                        <option value="미확정">미확정</option>
                        <option value="LCK">LCK</option>
                        <option value="시네티">시네티</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>일정 이미지</label>
                    <div class="file-upload-row">
                        <input type="text" id="eventImageUrl" class="flex-1 w-full p-[15px] rounded-[var(--radius-md)] border-2 border-[#F5F5F5] bg-[#F9F9F9]" placeholder="이미지 주소 (또는 업로드)">
                        <button class="image-upload-btn mt-2" onclick="document.getElementById('eventImgFile').click()">파일 선택</button>
                    </div>
                    <input type="file" id="eventImgFile" hidden accept="image/*" onchange="handleEventImgUpload(this)">
                </div>
                <div class="form-group"><label>참여 멤버 (쉼표 구분)</label><input type="text" id="eventMembers" placeholder="멤버A, 멤버B"></div>
                <div class="form-group"><label>공지 링크</label><input type="text" id="eventNoticeLink" placeholder="https://..." class="w-full p-[15px] rounded-[var(--radius-md)] border-2 border-[#F5F5F5] bg-[#F9F9F9]"></div>
            </div>

            <div class="modal-footer btn-group">
                <button id="delBtn" class="btn btn-danger" onclick="deleteEvent()">삭제</button>
                <button class="btn btn-cancel" onclick="closeModal('eventModal')">취소</button>
                <button class="btn btn-save" onclick="saveEvent()">저장하기</button>
            </div>
        </div>
    </div>

    <div id="infoModal" class="modal">
        <div class="modal-content">
            <h3 id="infoTitle" class="info-title"></h3>
            <div class="info-block">
                <div id="infoTime" class="time-badge"></div>
                <div id="infoImageContainer" class="info-image-container"></div>
                <div id="infoMemberContainer" class="w-full mt-4">
                    <div id="infoProfiles" class="profile-list"></div>
                </div>
            </div>
            <button id="infoNoticeBtn" class="btn btn-save w-full mt-3" style="display:none;" type="button">공지</button>
            <button class="btn btn-cancel w-full mt-3" onclick="closeModal('infoModal')">닫기</button>
        </div>
    </div>
    
    <div id="pwModal" class="modal">
        <div class="modal-content pw-modal">
            <h3 class="text-center font-black mb-5">관리자 인증</h3>
            <input type="password" id="adminPw" class="admin-pw" placeholder="비밀번호" onkeyup="if(event.key==='Enter') loginAdmin()">
            <p id="pwError" class="pw-error hidden">틀렸습니다.</p>
            <div class="btn-group">
                <button class="btn btn-cancel" onclick="closeModal('pwModal')">취소</button>
                <button class="btn btn-save" onclick="loginAdmin()">확인</button>
            </div>
        </div>
    </div>
    
    <div id="memberModal" class="modal">
        <div class="modal-content">
            <h2 class="modal-title">멤버 DB 관리</h2>
            <div id="memberList" class="member-list"></div>
            <div class="member-add-box">
               <h4 class="font-black mb-3">새 멤버 등록</h4>
               <input type="text" id="newMemberName" class="member-input" placeholder="닉네임">
               <input type="text" id="newMemberId" class="member-input" placeholder="SOOP 아이디 (예: htvv2i)">
               <button class="btn btn-save w-full" onclick="addMember()">멤버 추가하기</button>              
            </div>
            <button class="btn btn-cancel w-full mt-4" onclick="closeModal('memberModal')">닫기</button>
        </div>
    </div>

    <div id="confirmModal" class="modal">
        <div class="modal-content confirm-modal">
            <h3 class="font-black mb-4" id="confirmMessage">정말 삭제하시겠습니까?</h3>
            <div class="btn-group">
                <button class="btn btn-cancel" onclick="closeModal('confirmModal')">취소</button>
                <button id="confirmBtn" class="btn btn-danger">삭제</button>
            </div>
        </div>
    </div>

    <div id="monthPickerModal" class="modal">
        <div class="modal-content" style="max-width: 380px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
                <button class="nav-btn" onclick="changePickerYear(-1)">◀</button>
                <h3 id="pickerYearDisplay" class="text-2xl font-black"></h3>
                <button class="nav-btn" onclick="changePickerYear(1)">▶</button>
            </div>
            <div class="month-picker-grid" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;"></div>
            <button class="btn btn-cancel w-full mt-5" onclick="closeModal('monthPickerModal')">닫기</button>
        </div>
    </div>

    <div id="mobileMenuContainer" class="mobile-menu-container">
        <button class="mobile-menu-main-btn" onclick="toggleMobileMenu()">
            <svg id="menuIconDefault" viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            <svg id="menuIconClose" viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
