    <style>
        @font-face {
            font-family: 'GMarketSans';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansMedium.woff') format('woff');

        :root {
            --point-yellow: #FFF3B0;
            --point-text: #7A5A2F;
            --light-yellow: #FFF9C4;
            --bg-cream: #FFFDF0;
            --text-dark: #4E4942;
            --white: #FFFFFF;
            --radius-xl: 40px;
            --radius-lg: 30px;
            --radius-md: 20px;

            --font-event: 15px;
            --font-modal-label: 14px;
            --color-personal: #FFF9C4;
            --color-collab: #B3E5FC;
            --color-off: #E0E0E0;
            --color-tbd: #E1BEE7;
            --admin-color: #FF7043;
        }

        * { box-sizing: border-box; }

        html, body { margin: 0; min-height: 100%; width: 100%; }

        body {
            font-family: 'GMarketSans', sans-serif !important;
            background-color: var(--bg-cream);
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 60px;
            padding-bottom: 80px;
            position: relative;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 고정 상단바 디자인 */
        .fixed-top-bar {
            position: fixed; top: 0; left: 0; width: 100%; height: 60px;
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0,0,0,0.05); display: flex;
            justify-content: center; z-index: 9999;
        }
        .top-bar-inner {
            width: 96%; max-width: 1600px; display: flex; justify-content: space-between;
            align-items: center; height: 100%;
        }
        .top-bar-left { display: flex; gap: 12px; }
        .top-bar-right { display: flex; gap: 16px; align-items: center; }
        .nav-tab {
            background: transparent; border: none; font-weight: 900; font-size: 16px;
            color: #A09586; cursor: pointer; padding: 8px 16px; border-radius: 12px;
            transition: all 0.2s; display: flex; align-items: center; font-family: 'GMarketSans', sans-serif;
        }
        .nav-tab:hover { background: #FFFDF5; color: #EAB308; }
        .nav-tab.active { background: var(--point-yellow); color: #5D4037; }

        .top-bar-link {
            display: flex; align-items: center; justify-content: center; width: 36px; height: 36px;
            border-radius: 50%; transition: transform 0.2s ease; overflow: hidden;
        }
        .top-bar-link:hover { transform: scale(1.1); }
        .top-bar-link img { width: 100%; height: 100%; object-fit: cover; }
        .yt-link { color: #FF0000; }

        /* 관리자 우측 상단 버튼들 */
        .top-admin-actions {
            display: flex; gap: 8px; align-items: center; margin-left: 8px;
            border-left: 1px solid #E5E7EB; padding-left: 16px; position: relative;
        }
        .top-icon-btn {
            background: transparent; border: none; width: 36px; height: 36px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: 0.2s; border-radius: 50%; padding: 0;
        }
        .top-icon-btn:hover { background: #F3F4F6; }
        .top-icon-btn svg { transition: 0.2s; }
        .top-icon-btn:hover svg { transform: translateY(-1px); }

        .main-header {
            width: 96%; max-width: 1600px; display: grid; grid-template-columns: 1fr auto minmax(320px, 1fr);
            align-items: center; padding: 20px 45px 20px; margin: 0 auto; position: relative; gap: 24px;
        }

        .header-left, .header-right { display: flex; }
        .header-left { justify-content: flex-start; }
        .header-right { justify-content: flex-end; align-items: flex-start; }

        .header-center {
            grid-column: 2; justify-self: center; display: flex; flex-direction: column;
            align-items: center; position: relative; padding: 0 40px;
        }

        .logo-link {
            display: inline-block; text-decoration: none; outline: none; border-radius: 20px;
            padding: 10px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .logo-link:hover .main-logo {
            transform: scale(1.05) translateY(-2px);
            filter: brightness(0) saturate(100%) invert(85%) sepia(24%) saturate(1033%) hue-rotate(354deg) brightness(104%) contrast(102%) drop-shadow(0 10px 15px rgba(253, 224, 71, 0.4));
        }

        .logo-link:hover .fallback-logo {
            color: #FDE047; transform: scale(1.05) translateY(-2px);
        }

        .main-logo { height: 120px; object-fit: contain; display: block; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .fallback-logo { font-size: 48px; font-weight: 900; color: var(--text-dark); letter-spacing: -1px; display: none; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

        .today-summary {

        }
        .summary-item {
            display: flex; align-items: center; gap: 10px; margin-bottom: 8px;
            word-break: break-word; padding: 10px; border-radius: 12px;
            cursor: pointer; transition: background-color 0.2s ease;
        }
        .summary-item:hover { background-color: #F9F9F9; }
        .summary-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
        .summary-title { flex: 1; font-weight: 700; color: var(--text-dark); }
        .summary-time { font-size: 12px; color: #7a7a7a; white-space: nowrap; }

        .type-dot-합방 { background: #81D4FA; }

        .type-dot-미확정 { background: #CE93D8; }
        .type-dot-LCK { background: #FFB74D; }
        .type-dot-시네티 { background: #AED581; }

        .wave-container { width: 100%; height: 12px; margin: 10px 0; overflow: hidden; background: #F8F8F8; border-radius: 6px; }
        .wave {
            width: 200%; height: 100%;
            background: linear-gradient(90deg, rgba(255, 243, 176, 0.4), rgba(255, 243, 176, 0.9), rgba(255, 243, 176, 0.4), rgba(255, 243, 176, 0.9), rgba(255, 243, 176, 0.4));
            background-size: 50% 100%; animation: wave-move 3s linear infinite;
        }
        @keyframes wave-move { 0% { transform: translateX(-50%); } 100% { transform: translateX(0%); } }

        .player-controls { display: flex; justify-content: center; align-items: center; gap: 10px; }
        #btnMin {
            width: 30px; height: 30px; background: #E5E7EB; color: #4B5563;
            border-radius: 50%; border: none; cursor: pointer; display: flex;
            align-items: center; justify-content: center; position: absolute; left: 0; bottom: 0;
        }
        #btnMin:hover { background: #D1D5DB; color: #374151; }
        .ctrl-btn { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text-dark); transition: 0.2s; display: flex; align-items: center; justify-content: center; }
        .ctrl-btn:hover { transform: scale(1.1); color: #EAB308; }
        .play-btn { width: 48px; height: 48px; background: var(--point-yellow); border-radius: 50%; font-size: 20px; color: #5D4037; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .play-btn:hover { background: #FDE047; }
        .track-info { font-weight: 800; text-align: center; font-size: 15px; color: var(--text-dark); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding: 0 10px; }
        .track-artist { font-size: 12px; color: #7a7a7a; text-align: center; margin-top: 4px; }

        .container {
            width: 96%; max-width: 1600px; background: var(--white); border-radius: var(--radius-xl);
            padding: 45px; box-sizing: border-box; box-shadow: 0 20px 50px rgba(0,0,0,0.04);
            position: relative; display: flex; flex-direction: column;
        }

        .calendar-top { display: flex; justify-content: center; align-items: center; margin-bottom: 32px; width: 100%; }
        .calendar-header { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; width: 100%; max-width: none; margin: 0 auto; }
        .calendar-header-top { position: relative; display: flex; align-items: center; justify-content: center; width: 100%; gap: 12px; }
        .calendar-header-title { display: flex; align-items: center; justify-content: center; gap: 12px; flex: 1; }
        
        #monthDisplay { font-family: 'RixInuaridurine', sans-serif !important; } /* 달력 월 글꼴 변경 */

        /* 수정된 부분: 메모/UP 버튼 겹침 방지 (absolute 속성 제거, static 처리) */
        .memo-btn { 
            position: static !important; 
            margin: 0; 
            flex-shrink: 0; 
            background: transparent; border: 2px dashed #E5E1DA; border-radius: 999px; height: 50px; padding: 0 20px; 
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; 
            transition: all 0.2s ease; font-family: 'GMarketSans', sans-serif !important; font-weight: 900; font-size: 15px; color: var(--text-dark); 
        }
        .memo-btn:hover { color: #EAB308; border-color: #EAB308; }

        .calendar-body { display: flex; align-items: stretch; gap: 24px; width: 100%; }
        .calendar-main { flex: 1; min-width: 0; width: 100%; }

        .memo-panel-container {
            display: none; width: 360px; min-width: 280px; border-radius: var(--radius-lg); background: #FFFDF5;
            border: 1px solid #F5F5F5; box-shadow: 0 20px 45px rgba(0,0,0,0.08); padding: 22px; box-sizing: border-box;
            align-self: stretch; overflow: hidden;
        }
        .memo-panel-container.open { display: flex; flex-direction: column; }
        .memo-panel-header { display: flex; justify-content: space-between; align-items: center; gap: 14px; margin-bottom: 18px; }
        .memo-tabs { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
        .memo-tab { background: #F5F5F5; border: none; border-radius: 999px; padding: 10px 16px; cursor: pointer; font-weight: 800; color: #4E4942; transition: background 0.2s, color 0.2s; font-family: 'GMarketSans', sans-serif; }
        .memo-tab.memo-tab-active { background: #B3E5FC; color: #0D47A1; }

        .memo-add-button { background: var(--point-yellow); color: #5D4037; border: none; border-radius: 50%; width: 44px; height: 44px; cursor: pointer; font-weight: 900; font-size: 24px; line-height: 1; transition: 0.2s; display: flex; align-items: center; justify-content: center; padding: 0; }
        .memo-add-button:hover { opacity: 0.9; }
        .memo-input-area { display: flex; flex-direction: column; gap: 12px; margin-bottom: 18px; align-items: center; }
        .memo-input-area.hidden { display: none; }
        .memo-item-input { width: 100%; max-width: 100%; min-height: 100px; border: 2px solid #F5F5F5; border-radius: 18px; padding: 16px; resize: vertical; font-family: 'GMarketSans', sans-serif; background: #FFFFFF; color: var(--text-dark); box-sizing: border-box; }
        .memo-input-actions { display: flex; justify-content: flex-end; gap: 12px; width: 100%; }

        .memo-list { display: flex; flex-direction: column; gap: 12px; overflow-y: auto; max-height: calc(100% - 180px); padding-right: 4px; }
        .memo-item-entry { background: #FFFFFF; border: 1px solid #F5F5F5; border-radius: 18px; padding: 16px; display: flex; align-items: center; gap: 10px; word-break: break-word; }
        .memo-content-wrapper { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; }
        .memo-datetime { font-size: 12px; font-weight: 800; color: #A09586; background: #F9F9F9; padding: 4px 10px; border-radius: 12px; font-family: 'GMarketSans', sans-serif !important; }
        .memo-text-content { font-size: 16px; font-weight: 800; line-height: 1.5; color: var(--text-dark); white-space: pre-wrap; font-family: 'GMarketSans', sans-serif !important; text-align: center; width: 100%; }
        .memo-item-delete { background: transparent; border: none; color: #D32F2F; font-weight: 900; cursor: pointer; padding: 5px; flex-shrink: 0;}

        .songbook-section { display: none; width: 100%; flex-direction: row; gap: 0; padding: 0; margin: 0; flex: 1; min-height: 600px; background: white; border-radius: 0; overflow: visible; position: relative; }
        .songbook-section.visible { display: flex; max-height: calc(100vh - 260px); height: calc(100vh - 260px); }
        .songbook-loading {
            position: absolute; inset: 0; background: rgba(255, 255, 255, 0.86); backdrop-filter: blur(8px);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; transition: opacity 0.4s ease; border-radius: inherit;
        }
        .songbook-loading.hidden { opacity: 0; pointer-events: none; }
        .equalizer-loader { display: flex; gap: 6px; height: 40px; align-items: flex-end; margin-bottom: 24px; }
        .equalizer-loader .bar {
            width: 8px; height: 40px; background-color: #FBBF24; border-radius: 4px;
            transform-origin: bottom; animation: wave-bounce 0.5s ease-in-out infinite alternate;
        }
        .equalizer-loader .bar:nth-child(1) { animation-delay: 0.0s; }
        .equalizer-loader .bar:nth-child(2) { animation-delay: 0.1s; background-color: #60A5FA; }
        .equalizer-loader .bar:nth-child(3) { animation-delay: 0.2s; background-color: #F472B6; }
        .equalizer-loader .bar:nth-child(4) { animation-delay: 0.3s; }
        .equalizer-loader .bar:nth-child(5) { animation-delay: 0.4s; }

        @keyframes wave-bounce { 0% { transform: scaleY(0.2); } 100% { transform: scaleY(1); } }

        .songbook-sidebar { flex: 0 0 40%; max-width: 480px; background: white; border-right: 1px solid #F5F5F5; padding: 25px; overflow-x: hidden; display: flex; flex-direction: column; min-height: 0; height: calc(100vh - 260px); }
        .songbook-main-content { flex: 1 1 60%; padding: 40px; display: flex; flex-direction: column; overflow: hidden; min-width: 0; min-height: 0; }
        .fav-player-panel { background: var(--white); padding: 20px; border-radius: var(--radius-lg); width: 100%; box-shadow: none; border: 1px solid #F5F5F5; margin-bottom: 20px; flex: 0 0 auto; }
        .artist-list-wrapper { flex: 1 1 auto; min-height: 0; overflow-y: auto; overflow-x: hidden; padding-bottom: 24px; max-height: 760px; }
        .artist-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; min-height: 0; grid-auto-rows: minmax(0, auto); }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-button { display: none !important; width: 0 !important; height: 0 !important; -webkit-appearance: none; }
        ::-webkit-scrollbar-track { background: #FFFFFF; border-radius: 999px; }
        ::-webkit-scrollbar-thumb { background: #FDE047; border-radius: 999px; }
        ::-webkit-scrollbar-thumb:hover { background: #EAB308; }
        .artist-list-wrapper::-webkit-scrollbar, .songbook-sidebar::-webkit-scrollbar { width: 4px; }

        .mobile-player-close { display: none; }
        .mobile-menu-container { display: none; }
        * { scrollbar-color: #FDE047 #FFFFFF; scrollbar-width: thin; }

        .artist-btn { padding: 10px 18px; border: 1.5px solid #FDE047; background: #FFFDF0; border-radius: 12px; cursor: pointer; font-size: 0.9rem; transition: all 0.2s ease; color: #7A5A2F; font-weight: 600; font-family: 'GMarketSans', sans-serif;}
        .artist-btn:hover { background: #FFF9C4; border-color: #FDE047; color: #5D4037; }
        .artist-btn.active { background: #E1F5FE; border-color: #B3E5FC; color: #0288D1; font-weight: bold; }

        #favFilterBtn { width: 48px; height: 48px; padding: 0; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid #FDE047; background: white; color: #FBBF24; transition: all 0.2s ease; cursor: pointer; }
        #favFilterBtn:hover { background: #FFFBEA; border-color: #FDE047; }
        #favFilterBtn.active { background: #B3E5FC; border-color: #81D4FA; color: #0288D1; }

        .songbook-main-content { flex: 1 1 66.6667%; padding: 40px; display: flex; flex-direction: column; overflow: hidden; min-width: 0; min-height: 0; }
        .songbook-header { display: flex; justify-content: space-between; align-items: center; gap: 15px; margin-bottom: 30px; flex-wrap: wrap; }
        .songbook-search { flex: 1; padding: 15px 25px; border-radius: 30px; border: 2px solid #FDE047; background: white; outline: none; font-size: 1rem; color: var(--text-dark); font-family: 'GMarketSans', sans-serif;}
        .songbook-content { display: flex; flex-direction: column; gap: 14px; flex: 1; overflow-y: auto; min-height: 0; padding-bottom: 24px; }

        .song-item { background: white; padding: 18px 25px; border-radius: 15px; display: flex; align-items: center; justify-content: space-between; border: 1px solid var(--point-yellow); gap: 12px; transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease; }
        .song-item:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.06); background-color: #FFFEF5; }

        .favorite-btn { background: transparent; border: none; cursor: pointer; color: #D1D5DB; transition: transform 0.2s, color 0.2s; padding: 0; display: flex; align-items: center; justify-content: center; }
        .favorite-btn:hover { transform: scale(1.15); }
        .favorite-btn.is-favorite { color: #FBBF24; }
        .song-item-left { display: flex; flex-direction: column; align-items: center; justify-content: center; min-width: 56px; flex-shrink: 0; gap: 6px; }
        .song-clickable { flex: 1; cursor: pointer; display: flex; flex-direction: column; gap: 4px; }
        .song-title { font-weight: 700; font-size: 1.1rem; display: block; color: var(--text-dark); }
        .song-artist { font-size: 0.9rem; color: #7A7A7A; }
        .condition-badge { background-color: #FCE4EC; color: #D81B60; font-size: 0.65rem; font-weight: 800; padding: 3px 6px; border-radius: 8px; border: 1px solid #F8BBD0; white-space: nowrap; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; font-family: 'GMarketSans', sans-serif; }

        .song-delete-btn { background: #fee2e2; color: #ef4444; border: none; border-radius: 50%; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: 900; font-size: 16px; transition: transform 0.2s, background-color 0.2s; padding: 0; flex-shrink: 0; margin-left: 4px; }
        .song-delete-btn:hover { transform: scale(1.1); background: #fca5a5; color: #991b1b; }

        .add-song-btn:hover { transform: scale(1.1); opacity: 0.95; }

        .songbook-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); justify-content: center; align-items: center; z-index: 1000; padding: 20px; }
        .songbook-modal.visible { display: flex; }

        .browser-container { width: min(90%, 1080px); max-height: 92vh; background: white; border-radius: 20px; overflow: hidden; display: flex; flex-direction: column; }
        .browser-header { background: #f3f4f6; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e5e7eb; }

                        <svg viewBox="0 0 24 24" width="22" style="fill: #4E4942;"><path d="M12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6zM19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62-.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.21.07-.47-.12-.61l-2.01-1.58z"/></svg>

    <div id="loadingOverlay" class="loading-overlay">
        <div class="cute-loading-text">
            <span>L</span><span>O</span><span>A</span><span>D</span><span>I</span><span>N</span><span>G</span>
        </div>
    </div>

    <header class="main-header">
        <div class="header-left"></div>
        <div class="header-center">
            <a href="https://www.sooplive.com/station/htvv2i" target="_blank" rel="noopener noreferrer" class="logo-link">
                <img src="https://i.postimg.cc/2yGbBGtT/logo.png" alt="HTVVI Logo" class="main-logo" onerror="this.style.display='none'; document.getElementById('fallbackLogo').style.display='block';">
                <div id="fallbackLogo" class="fallback-logo">htvvi</div>
            </a>
        </div>
        <div class="header-right">
            <div id="todaySchedulePanel" class="today-summary">
                <h4 class="font-black text-xl mb-4 flex items-center gap-2" style="font-family: 'GMarketSans', sans-serif;">
                    <span class="w-2 h-5 bg-amber-400 rounded-full"></span>오늘 일정
                </h4>
                <div id="summaryContent"></div>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="calendar-top">
            <div class="calendar-header mt-2">
                <div class="calendar-header-top" style="position: relative; display: flex; justify-content: center; align-items: center; width: 100%;">
                    <div class="calendar-header-title">
                        <button class="nav-btn" onclick="moveMonth(-1)">◀</button>
                        <h2 id="monthDisplay" class="text-4xl font-black cursor-pointer hover:text-amber-400 transition-colors text-center select-none" style="min-width: 240px;" title="월 선택" onclick="openMonthPicker()"></h2>
                        <button class="nav-btn" onclick="moveMonth(1)">▶</button>
                    </div>
                    
                    <div style="position: absolute; right: 0; display: flex; gap: 8px; align-items: center;">
                        <button id="upBoardBtn" class="memo-btn" title="UP! 게시판 열기/닫기" onclick="toggleUpBoard()">
                            <svg viewBox="0 0 24 24" width="20" fill="currentColor"><path d="M4 12l1.41 1.41L11 7.83V20h2V7.83l5.58 5.59L20 12l-8-8-8 8z"/></svg>
                            <span>UP!</span>
                        </button>
                        <button id="memoBoardBtn" class="memo-btn" title="메모장 열기/닫기" onclick="toggleMemo()">
                            <svg viewBox="0 0 24 24" width="20" fill="currentColor"><path d="M14,2H6C4.9,2,4.01,2.9,4.01,4L4,20c0,1.1,0.89,2,1.99,2H18c1.1,0,2-0.9,2-2V8L14,2z M18,20H6V4h7v5h5V20z"/></svg>
                            <span>MEMO</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="calendar-body">
            <div id="calendarMain" class="calendar-main">
                <div class="calendar-grid" id="calendarGrid"></div>
            </div>

            <button class="mobile-nav-arrow left-arrow" onclick="moveMonth(-1)" aria-label="이전 달">
                <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"></polyline></svg>
            </button>
            <button class="mobile-nav-arrow right-arrow" onclick="moveMonth(1)" aria-label="다음 달">
                <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"></polyline></svg>
            </button>
            
            <div id="memoPanel" class="memo-panel-container">
                <button class="mobile-player-close" onclick="toggleMobileMemo()" title="닫기" id="mobileMemoCloseBtn" style="display: none;">
                    <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="6 9 12 15 18 9"></polyline>
                    </svg>
                </button>
                <div class="memo-panel-header">
                    <div class="memo-tabs">
                        <button class="memo-tab memo-tab-active" data-tab="컨텐츠" onclick="selectMemoTab('컨텐츠')">컨텐츠</button>
                        <button class="memo-tab" data-tab="LCK" onclick="selectMemoTab('LCK')">LCK</button>
                        <button class="memo-tab" data-tab="시네티" onclick="selectMemoTab('시네티')">시네티</button>
                    </div>
                    <button id="memoAddBtn" class="memo-add-button admin-only-btn" onclick="openMemoInput()">+</button>
                </div>
                <div id="memoInputArea" class="memo-input-area hidden">
                    <div style="display: flex; gap: 10px; width: 100%;">
                        <input type="date" id="memoDateInput" class="admin-input" style="flex: 1; padding: 10px; font-size: 14px;" title="일정 날짜">
                        <input type="time" id="memoTimeInput" class="admin-input" style="flex: 1; padding: 10px; font-size: 14px;" title="일정 시간">
                    </div>
                    <textarea id="memoItemText" class="memo-item-input" placeholder="메모 내용을 입력하세요"></textarea>
                    <div class="memo-input-actions">
                        <button class="btn btn-cancel" onclick="closeMemoInput()">취소</button>
                        <button class="btn btn-save" onclick="saveMemoItem()">추가하기</button>
                    </div>
                </div>
                <div id="memoList" class="memo-list"></div>
            </div>

            <div id="upPanel" class="memo-panel-container">
                <button class="mobile-player-close" onclick="toggleMobileUpBoard()" title="닫기" id="mobileUpCloseBtn" style="display: none;">
                    <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="6 9 12 15 18 9"></polyline>
                    </svg>
                </button>
                <div class="memo-panel-header" style="justify-content: center;">
                    <h3 style="margin: 0; font-family: 'GMarketSans'; font-weight: 900; color: #0284c7;">UP! 컨텐츠 보드</h3>
                </div>
                <div id="upList" class="memo-list" style="padding: 10px;"></div>
            </div>
        </div>

        <div id="songbookSection" class="songbook-section">
            <div id="songbookLoading" class="songbook-loading hidden">
                <div class="equalizer-loader">
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                </div>
                <div style="font-weight: 900; color: var(--text-dark); font-size: 20px; font-family: 'GMarketSans', sans-serif;">노래책을 펼치는 중...</div>
            </div>

            <div class="songbook-sidebar">
                <div id="favoritePlayerPanel" class="fav-player-panel is-minimized">
                    <button id="mobilePlayerCloseBtn" class="mobile-player-close" onclick="toggleMobilePlayer()" title="닫기">
                        <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="6 9 12 15 18 9"></polyline>
                        </svg>
                    </button>
                    <div class="music-note-btn" onclick="toggleMinimize()" style="cursor: pointer; text-align: center; font-size: 24px; display: none;">🎵</div>
                    <div id="panelContent">
                        <h4 class="font-black text-xl mb-4 flex items-center gap-2" style="font-family: 'GMarketSans', sans-serif;">
                            플레이어
                        </h4>
                        <div id="playerWrapper" style="width: 100%; aspect-ratio: 16 / 9; background: #000; border-radius: 12px; margin-bottom: 10px; overflow: hidden; display: none;"></div>

                        <div class="track-info" id="playerTrackTitle">재생할 곡이 없습니다</div>
                        <div class="track-artist" id="playerTrackArtist">곡을 선택해주세요.</div>

                        <div id="visualizer" class="wave-container" style="display: none;">
                            <div class="wave"></div>
                        </div>

                        <div class="player-controls" style="position: relative; margin-top: 15px; height: 50px;">
                            <button class="ctrl-btn" id="btnMin" onclick="toggleScreen()" title="화면 켜기/끄기">
                                <svg id="iconMin" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="3">
                                    <line x1="5" y1="12" x2="19" y2="12"></line>
                                </svg>
                            </button>
                            <button class="ctrl-btn" onclick="prevFavSong()">⏮</button>
                            <button class="ctrl-btn play-btn" id="playPauseBtn" onclick="toggleFavPlay()">▶</button>
                            <button class="ctrl-btn" onclick="nextFavSong()">⏭</button>
                        </div>
                    </div>
                </div>

                <div class="artist-list-wrapper">
                    <div class="artist-grid" id="artistList"></div>
                </div>
            </div>

            <div class="songbook-main-content">
                <div class="songbook-header">
                    <button id="favFilterBtn" class="artist-btn" onclick="setSongbookFilter('Favorites')" type="button" title="즐겨찾기">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M10.788 3.21c.448-1.077 1.976-1.077 2.424 0l2.082 5.007 5.404.433c1.164.093 1.636 1.545.749 2.305l-4.117 3.527 1.257 5.273c.271 1.136-.964 2.033-1.96 1.425L12 18.354 7.373 21.18c-.996.608-2.231-.29-1.96-1.425l1.257-5.273-4.117-3.527c-.887-.76-.415-2.212.749-2.305l5.404-.433 2.082-5.006z" /></svg>
                    </button>
                    <input id="songbookSearch" class="songbook-search" type="text" placeholder="노래 제목 또는 가수를 검색하세요" oninput="renderSongbook()">
                    <button id="songbookAddBtn" class="add-song-btn" type="button" onclick="document.getElementById('adminSongForm').classList.add('visible'); document.getElementById('newSongTitle').focus();">+</button>
                </div>
                <div id="adminSongForm" class="admin-song-form">
                    <div class="admin-form-row">
                        <input id="newSongTitle" class="admin-input" type="text" placeholder="노래 제목">
                        <input id="newSongArtist" class="admin-input" type="text" placeholder="가수명">
                        <input id="newSongUrl" class="admin-input" type="text" placeholder="유튜브 또는 링크 주소 (선택)">
                        <label style="display: flex; align-items: center; gap: 8px; font-weight: 700; color: var(--text-dark); padding: 4px 8px; cursor: pointer; font-family: 'GMarketSans', sans-serif;">
                            <input type="checkbox" id="isConditionSong" style="width: 18px; height: 18px; accent-color: #F48FB1; cursor: pointer;">
                            컨디션곡 (목 상태에 따라 부르는 곡)
                        </label>
                    </div>
                    <div style="display: flex; gap: 12px; margin-bottom: 16px;">
                        <button class="admin-add-btn" type="button" onclick="addSong()" id="addSongBtn">노래 추가</button>
                        <button class="admin-add-btn" type="button" onclick="cancelEdit()" style="background: #e5e7eb; color: #6b7280;">취소</button>
                    </div>
                </div>
                <div id="songList" class="songbook-content"></div>
            </div>
        </div>

        <div id="browserModal" class="songbook-modal">
            <div class="browser-container">
                <div class="browser-header">
                    <span id="browserTitle" style="font-weight: 800; color: #4E4942; font-family: 'GMarketSans', sans-serif;">HTVVI 브라우저</span>
                    <button class="close-browser" onclick="closeBrowser()">닫기</button>
                </div>
                <div class="browser-content-wrapper">
                    <iframe id="browserIframe" class="browser-iframe" allow="autoplay; clipboard-write; web-share;" allowfullscreen="true"></iframe>
                </div>
                <div class="browser-footer">
                    <button id="modalFavoriteBtn" class="modal-favorite-btn" onclick="toggleModalFavorite()">☆ 즐겨찾기 추가</button>
                </div>
            </div>
        </div>
    </div>

    <div id="eventModal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><h2 id="modalTitle" class="modal-title">일정 추가</h2></div>
            <div class="modal-body">
                <input type="hidden" id="editingEventDocId" value="">
                <input type="hidden" id="editIndex" value="-1">
                <div class="form-group">
                    <label>일정 제목</label>
                    <input type="text" id="eventTitle" placeholder="예: 생방송, 합방 등">
                </div>
                <div class="form-group custom-time-picker">
                    <label>시간 설정</label>
                    <div class="ampm-toggle">
                        <button class="ampm-btn active" id="ampmAM" onclick="setAMPM('오전')">오전</button>
                        <button class="ampm-btn" id="ampmPM" onclick="setAMPM('오후')">오후</button>
                    </div>
                    <div class="time-input-container" style="display:flex; gap:10px; align-items:center; margin-top:10px;">
                        <div class="time-field" style="flex:1"><input type="number" class="admin-input" id="timeHour" min="1" max="12" placeholder="시간 (12)"></div>
                        <div class="time-colon">:</div>
                        <div class="time-field" style="flex:1"><input type="number" class="admin-input" id="timeMin" min="0" max="59" placeholder="분 (00)"></div>
                    </div>
                </div>
                <div class="form-group" style="display:flex; gap:10px;">
                    <div style="flex:1"><label>시작일</label><input type="date" id="eventStartDate"></div>
                    <div style="flex:1"><label>종료일</label><input type="date" id="eventEndDate"></div>
                </div>
                <div class="form-group">
                    <label>일정 분류</label>
                    <select id="eventType">
                        <option value="개인방송">개인방송</option>
                        <option value="합방">합방</option>
                        <option value="휴방">휴방</option>
                        <option value="LCK">LCK</option>
                        <option value="시네티">시네티</option>
                        <option value="미확정">미확정</option>
                    </select>
                </div>
                <div class="form-group"><label>참여자 (쉼표로 구분)</label><input type="text" id="eventMembers" placeholder="예: 햇비, 멤버1"></div>
                <div class="form-group"><label>공지 링크</label><input type="text" id="eventNoticeLink" placeholder="https://..."></div>
                <div class="form-group">
                    <label>포스터/썸네일 이미지</label>
                    <div class="file-upload-row" style="display:flex; gap:10px;">
                        <input type="text" id="eventImageUrl" placeholder="이미지 URL 직접 입력" style="flex:1;">
                        <label class="image-upload-btn" style="background:#FDE047; color:#7A5A2F; padding: 15px; border-radius: 12px; font-weight:800; cursor:pointer; font-family: 'GMarketSans', sans-serif;">
                            <span>업로드</span><input type="file" id="eventImgFile" accept="image/*" style="display:none;" onchange="handleEventImgUpload(this)">
                        </label>
                    </div>
                </div>
            </div>
            <div class="modal-footer btn-group">
                <button class="btn btn-cancel" onclick="closeModal('eventModal')">취소</button>
                <button id="delBtn" class="btn btn-danger" onclick="deleteEvent()" style="display:none;">삭제</button>
                <button class="btn btn-save" onclick="saveEvent()">저장</button>
            </div>
        </div>
    </div>

    <div id="infoModal" class="modal">
        <div class="modal-content">
            <div id="infoTitle" class="info-title" style="font-family: 'GMarketSans', sans-serif;"></div>
            <div class="info-block">
                <div id="infoTime" class="time-badge"></div>
                <div id="infoImageContainer" class="info-image-container"></div>
                <div id="infoProfiles" class="profile-list"></div>
                <div id="infoNoticePreview" class="notice-preview"></div>
            </div>
            <button class="btn btn-cancel" style="margin-top: 15px;" onclick="closeModal('infoModal')">닫기</button>
        </div>
    </div>

    <div id="pwModal" class="modal">
        <div class="modal-content pw-modal">
            <h3 class="text-center font-black mb-5" style="font-family: 'GMarketSans', sans-serif; font-size:24px;">관리자 인증</h3>
            <input type="password" id="adminPw" class="admin-pw" placeholder="비밀번호" onkeyup="if(event.key==='Enter') loginAdmin()">
            <p id="pwError" class="pw-error hidden">틀렸습니다.</p>
            <div class="btn-group">
                <button class="btn btn-cancel" onclick="closeModal('pwModal')">취소</button>
                <button class="btn btn-save" onclick="loginAdmin()">확인</button>
            </div>
        </div>
    </div>
    
    <div id="memberModal" class="modal">
        <div class="modal-content">
            <h3 class="modal-title">멤버 관리</h3>
            <div id="memberList" class="member-list"></div>
            <div class="member-add-box">
                <h4 style="font-weight:900; margin-bottom:12px; font-family: 'GMarketSans', sans-serif;">새 멤버 추가</h4>
                <input type="text" id="newMemberName" class="admin-input" placeholder="멤버 이름 (닉네임)" style="margin-bottom: 8px;">
                <input type="text" id="newMemberId" class="admin-input" placeholder="SOOP 아이디" style="margin-bottom: 12px;">
                <input type="hidden" id="newMemberImg">
                <button class="btn btn-save" style="width:100%; padding:14px;" onclick="addMember()">추가하기</button>
            </div>
            <button class="btn btn-cancel" style="margin-top:15px;" onclick="closeModal('memberModal')">닫기</button>
        </div>
    </div>

    <div id="confirmModal" class="modal">
        <div class="modal-content" style="max-width: 320px; align-items: center; text-align: center;">
            <h3 id="confirmMessage" class="font-black text-lg mb-6" style="font-family: 'GMarketSans', sans-serif;"></h3>
            <div class="btn-group" style="width: 100%;">
                <button class="btn btn-cancel" onclick="closeModal('confirmModal')">취소</button>
                <button id="confirmBtn" class="btn btn-danger">삭제</button>
            </div>

        function updateFavPlayerPlaylist() {
            const favorites = getFavorites();
            favPlaylist = songbookSongs.filter(s => favorites.includes(s.id));
            
            const playerTitle = document.getElementById('playerTrackTitle');
            const playerArtist = document.getElementById('playerTrackArtist');

            if (favPlaylist.length === 0) {

                if(playerArtist) playerArtist.innerText = "곡을 즐겨찾기 해보세요.";

                if(btn) btn.innerText = "▶";
                if(visualizer) visualizer.style.display = 'none';
                isPlaying = false;
                return;
            }
            
            if (currentFavIndex >= favPlaylist.length) currentFavIndex = 0;
            
            if(playerTitle) playerTitle.innerText = favPlaylist[currentFavIndex].title;
            if(playerArtist) playerArtist.innerText = favPlaylist[currentFavIndex].artist;

            const playerWrapper = document.getElementById('playerWrapper');

            const visualizer = document.getElementById('visualizer');

                let iframeCode = "";

                if (currentSong.url.includes("sooplive.com/player/")) {
                    const match = currentSong.url.match(/player\/(\d+)/);
                    const videoId = match ? match[1] : currentSong.url.split('/').pop().split('?')[0];

        function getWeekOfMonth(date) {
            const target = new Date(date);
            const day = target.getDay();
            const diff = target.getDate() - day + (day === 0 ? -6 : 1);
            const monday = new Date(target.setDate(diff));
            const year = monday.getFullYear();
            const month = monday.getMonth();
            const firstDay = new Date(year, month, 1);
            const firstDayOfWeek = firstDay.getDay() === 0 ? 6 : firstDay.getDay() - 1;
            let firstMonday = new Date(year, month, 1 - firstDayOfWeek);
            const diffTime = monday.getTime() - firstMonday.getTime();
            const diffDays = Math.round(diffTime / (1000 * 60 * 60 * 24));
            const weekNo = Math.floor(diffDays / 7) + 1;
            return { month: month + 1, week: weekNo };
        }

            members = {};

            snapshot.forEach(docSnap => {
                const data = docSnap.data();
                if (!data || !data.name) return;
                members[data.name] = { name: data.name, img: data.img || `https://placehold.co/100x100/FFD54F/ffffff?text=${encodeURIComponent(data.name[0] || '')}` };
            });
        }

        async function loadEventsForMonth(year, month) {
            const monthKey = `${year}-${month}`;
            if (loadedMonths.has(monthKey)) return;

            const q = query(collection(db, 'events'), where('dateId', '>=', `${year}-${month}-`), where('dateId', '<=', `${year}-${month}-\uf8ff`));
            const snapshot = await getDocs(q);
            const docs = [];
            snapshot.forEach(docSnap => {
                const data = docSnap.data();
                if (!data || !data.dateId) return;
                docs.push({ ...data, id: docSnap.id });
            });

            docs.sort((a, b) => {
                const dateA = new Date(a.startDate || a.dateId).getTime();
                const dateB = new Date(b.startDate || b.dateId).getTime();
                if (dateA !== dateB) return dateA - dateB;
                return (a.order ?? 9999) - (b.order ?? 9999);
            });

            docs.forEach(data => {
                if (!events[data.dateId]) events[data.dateId] = [];
                if (!events[data.dateId].some(e => e.id === data.id)) events[data.dateId].push(data);
            });
            loadedMonths.add(monthKey);
        }

        async function ensureMonthsLoadedForDate(date) {
            const y = date.getFullYear();
            const m = date.getMonth() + 1;
            await loadEventsForMonth(y, m);

            const isMobile = window.innerWidth < 768;
            if (isMobile) {
                const target = new Date(date);
                const dayNum = target.getDay();
                const diff = target.getDate() - dayNum + (dayNum === 0 ? -6 : 1);
                const monday = new Date(target.setDate(diff));
                const sunday = new Date(monday);
                sunday.setDate(monday.getDate() + 6);

                if (monday.getMonth() !== date.getMonth()) await loadEventsForMonth(monday.getFullYear(), monday.getMonth() + 1);
                if (sunday.getMonth() !== date.getMonth()) await loadEventsForMonth(sunday.getFullYear(), sunday.getMonth() + 1);
            }
        }

        async function saveEvent() {
            const title = document.getElementById('eventTitle').value.trim();
            if (!title) return showToast('제목을 입력하세요.');
            const hRaw = document.getElementById('timeHour').value;
            const mRaw = document.getElementById('timeMin').value;
            let timeStr = '';
            if (hRaw !== '') {
                let h = parseInt(hRaw, 10);
                const m = parseInt(mRaw || '0', 10);
                if (currentAMPM === '오후' && h < 12) h += 12;
                if (currentAMPM === '오전' && h === 12) h = 0;
                timeStr = `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
            }

            const startStr = document.getElementById('eventStartDate').value;
            const endStr = document.getElementById('eventEndDate').value;
            const type = document.getElementById('eventType').value;
            const members = document.getElementById('eventMembers').value;
            const noticeLink = document.getElementById('eventNoticeLink').value.trim();
            const imageUrl = document.getElementById('eventImageUrl').value;

            const editingDocId = document.getElementById('editingEventDocId').value;
            const isEditing = editingDocId !== '';

            try {
                const data = {
                    title, time: timeStr, type, members, noticeLink, imageUrl,
                    dateId: activeDateId, startDate: startStr, endDate: endStr,
                };

                if (isEditing) {
                    await setDoc(doc(db, 'events', editingDocId), data);
                    showToast('일정이 수정되었습니다.');
                } else {
                    const sDate = new Date(startStr);
                    const eDate = new Date(endStr);
                    for (let d = new Date(sDate); d <= eDate; d.setDate(d.getDate() + 1)) {
                        const dateId = `${d.getFullYear()}-${d.getMonth() + 1}-${d.getDate()}`;
                        await addDoc(collection(db, 'events'), { ...data, dateId });
                    }
                    showToast('일정이 추가되었습니다.');
                }

                loadedMonths.clear();
                events = {};
                await ensureMonthsLoadedForDate(currentDate);

                document.getElementById('editingEventDocId').value = '';
                document.getElementById('editIndex').value = '-1';
                closeModal('eventModal'); renderCalendar();
            } catch (error) { console.error(error); showToast(`저장 실패: ${error.message}`); }
        }

        async function deleteEvent() {
            const idx = parseInt(document.getElementById('editIndex').value, 10);
            if (!confirm('이 일정을 삭제할까요?')) return;
            try {
                const editingDocId = document.getElementById('editingEventDocId') ? document.getElementById('editingEventDocId').value : '';
                if (editingDocId) {
                    await deleteDoc(doc(db, 'events', editingDocId));
                } else {
                    const existingEvent = events[activeDateId] && events[activeDateId][idx];
                    if (existingEvent && existingEvent.id) await deleteDoc(doc(db, 'events', existingEvent.id));
                }
                loadedMonths.clear(); events = {};
                await ensureMonthsLoadedForDate(currentDate);
                if (document.getElementById('editingEventDocId')) document.getElementById('editingEventDocId').value = '';
                closeModal('eventModal'); renderCalendar(); showToast('일정이 삭제되었습니다.');
            } catch (error) { console.error(error); showToast('일정 삭제에 실패했습니다.'); }
        }

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            if(!grid) return;
            grid.innerHTML = '';
            const isMobile = window.innerWidth < 768;
            
            if (isMobile) {
                grid.className = 'calendar-grid weekly-view';
                const target = new Date(currentDate);
                const dayNum = target.getDay();
                const diff = target.getDate() - dayNum + (dayNum === 0 ? -6 : 1);
                const monday = new Date(target.setDate(diff));
                
                const { month, week } = getWeekOfMonth(currentDate);
                const monthDisplay = document.getElementById('monthDisplay');
                if(monthDisplay) monthDisplay.innerText = `${currentDate.getFullYear()}년 ${month}월 ${week}째주`;
                
                const yoils = ['월', '화', '수', '목', '금', '토', '일'];
                const yoilColors = ['', '', '', '', '', 'text-blue-500', 'text-red-500'];
                
                for (let i = 0; i < 7; i++) {
                    const dayDate = new Date(monday);
                    dayDate.setDate(monday.getDate() + i);
                    
                    const num = dayDate.getDate(); const m = dayDate.getMonth() + 1; const y = dayDate.getFullYear();
                    const dateId = `${y}-${m}-${num}`;
                    
                    const row = document.createElement('div'); row.className = 'week-row';
                    if (isAdmin) row.onclick = () => openAddModal(dateId);
                    
                    const dayLabel = document.createElement('div'); dayLabel.className = 'week-day-label';
                    const dayName = document.createElement('span'); dayName.className = `week-day-name ${yoilColors[i] || ''}`; dayName.innerText = yoils[i];
                    const dayNumber = document.createElement('span');
                    const today = new Date();
                    const isToday = dayDate.getDate() === today.getDate() && dayDate.getMonth() === today.getMonth() && dayDate.getFullYear() === today.getFullYear();
                    
                    dayNumber.className = `week-day-num ${yoilColors[i] || ''}`; dayNumber.innerText = num;
                    if (isToday) row.classList.add('border-2', 'border-sky-400', 'rounded-xl');
                    
                    dayLabel.appendChild(dayName); dayLabel.appendChild(dayNumber);
                    
                    const eventsDiv = document.createElement('div'); eventsDiv.className = 'week-events';
                    if (events[dateId] && events[dateId].length > 0) {
                        events[dateId].forEach((ev, idx) => {
                            const isLong = ev.startDate && ev.endDate && (new Date(ev.endDate) > new Date(ev.startDate));
                            const tag = document.createElement('div');
                            tag.className = `event-tag type-${ev.type}${isLong ? ' long-term' : ''}`; tag.dataset.id = ev.id;
                            tag.innerHTML = `${ev.time ? `<span class="event-time-badge">${formatTime12h(ev.time)}</span>` : ''}<div style="flex: 1; display: flex; align-items: center; justify-content: center; width: 100%; line-height: 1.2; word-break: break-word;">${ev.title}</div>`;
                            tag.onclick = (e) => { e.stopPropagation(); showInfoByEvent(ev); };
                            if (isAdmin) tag.oncontextmenu = (e) => { e.preventDefault(); e.stopPropagation(); openEditModal(dateId, idx); };
                            eventsDiv.appendChild(tag);
                        });
                    } else {
                        const noEvent = document.createElement('div'); noEvent.className = 'week-no-event'; noEvent.innerText = '등록된 일정이 없습니다.'; eventsDiv.appendChild(noEvent);
                    }
                    row.appendChild(dayLabel); row.appendChild(eventsDiv); grid.appendChild(row);
                }
            } else {
                grid.className = 'calendar-grid';
                grid.innerHTML = `<div class="day-label">월</div><div class="day-label">화</div><div class="day-label">수</div><div class="day-label">목</div><div class="day-label">금</div><div class="day-label text-blue-400">토</div><div class="day-label text-red-400">일</div>`;
                
                const y = currentDate.getFullYear(); const m = currentDate.getMonth();
                const monthDisplay = document.getElementById('monthDisplay');
                if (monthDisplay) monthDisplay.innerText = `${y}년 ${m + 1}월`;
                
                const firstDay = new Date(y, m, 1); const lastDay = new Date(y, m + 1, 0);
                const startIdx = firstDay.getDay() === 0 ? 6 : firstDay.getDay() - 1;
                const prevLastDay = new Date(y, m, 0).getDate();
                
                for (let i = startIdx; i > 0; i--) createDay(prevLastDay - i + 1, false);
                for (let i = 1; i <= lastDay.getDate(); i++) {
                    const d = new Date(y, m, i); const dateId = `${y}-${m + 1}-${i}`;
                    const allEvents = Object.values(events).flat();
                    const todaysEvents = allEvents.filter(ev => {
                        if (!ev.startDate) return ev.dateId === dateId;
                        const start = new Date(ev.startDate); const end = new Date(ev.endDate);
                        start.setHours(0,0,0,0); end.setHours(0,0,0,0);
                        return d >= start && d <= end;
                    });
                    createDay(i, true, todaysEvents);
                }
            }
            applyDraggable(); updateAdminUI(); updateSummary();
        }

        function applyDraggable() {
            document.querySelectorAll('.event-container, .week-events').forEach(el => {
                if (isAdmin) {
                    if (!el.sortableInstance && window.Sortable) {
                        el.sortableInstance = new Sortable(el, {
                            animation: 150, ghostClass: 'dragging-ghost', fallbackOnBody: true, delay: 200, delayOnTouchOnly: true, fallbackTolerance: 5,
                            onStart: function(evt) { evt.item.style.height = evt.item.offsetHeight + 'px'; },
                            onEnd: function (evt) {
                                evt.item.style.height = '';
                                const dateId = evt.to.closest('.day')?.dataset.dateId || evt.to.parentElement.closest('.week-row')?.dataset.dateId;
                                if (dateId) modifiedDates.add(dateId);
                            }
                        });
                    }
                } else {
                    if (el.sortableInstance) { el.sortableInstance.destroy(); el.sortableInstance = null; }
                }
            });
        }

        function createDay(num, isCurr, dayEvents = []) {
            const dateId = `${currentDate.getFullYear()}-${currentDate.getMonth() + 1}-${num}`;
            const div = document.createElement('div'); div.dataset.dateId = dateId; div.className = 'day' + (isCurr ? '' : ' not-current');
            const numDiv = document.createElement('div'); numDiv.className = 'day-num';
            const today = new Date();
            const isToday = isCurr && today.getDate() === num && today.getMonth() === currentDate.getMonth() && today.getFullYear() === currentDate.getFullYear();
            numDiv.innerHTML = isCurr ? (isToday ? `<span class="today-circle">${num}</span>` : num) : '';
            div.appendChild(numDiv);
            const evCont = document.createElement('div'); evCont.className = 'event-container';
            if (isCurr && dayEvents && dayEvents.length > 0) {
                dayEvents.forEach((ev, idx) => {
                    const isLong = ev.startDate && ev.endDate && (new Date(ev.endDate) > new Date(ev.startDate));
                    const tag = document.createElement('div');
                    tag.className = `event-tag type-${ev.type}${isLong ? ' long-term' : ''}`; tag.dataset.id = ev.id;
                    tag.innerHTML = `${ev.time ? `<span class="event-time-badge">${formatTime12h(ev.time)}</span>` : ''}<div style="flex: 1; display: flex; align-items: center; justify-content: center; width: 100%; line-height: 1.2; word-break: break-word;">${ev.title}</div>`;
                    tag.onclick = (e) => { e.stopPropagation(); showInfoByEvent(ev); };
                    if (isAdmin) tag.oncontextmenu = (e) => { e.preventDefault(); e.stopPropagation(); openEditModalByEvent(ev); };
                    evCont.appendChild(tag);
                });
            }
            div.appendChild(evCont);
            if (isCurr && isAdmin) div.onclick = () => openAddModal(dateId);
            document.getElementById('calendarGrid').appendChild(div);
        }

        function showInfoByEvent(ev) {
            if (!ev) return;
            const titleEl = document.getElementById('infoTitle');
            if (titleEl) titleEl.innerText = ev.title || '';
            
            let dateText = '';
            if (ev.startDate && ev.endDate) {
                const s = new Date(ev.startDate); const e = new Date(ev.endDate);
                dateText = `${s.getFullYear().toString().slice(-2)}.${s.getMonth()+1}.${s.getDate()}${(ev.time ? ` | ${formatTime12h(ev.time)}` : '')}`;
                if (ev.startDate !== ev.endDate) dateText = `${s.getFullYear().toString().slice(-2)}.${s.getMonth()+1}.${s.getDate()} - ${e.getFullYear().toString().slice(-2)}.${e.getMonth()+1}.${e.getDate()}${(ev.time ? ` | ${formatTime12h(ev.time)}` : '')}`;
            } else if (ev.dateId) {
                const parts = ev.dateId.split('-'); dateText = `${parts[0].slice(-2)}.${parts[1]}.${parts[2]}${(ev.time ? ` | ${formatTime12h(ev.time)}` : '')}`;
            } else {
                dateText = ev.time ? formatTime12h(ev.time) : '시간 미정';
            }
            
            const timeEl = document.getElementById('infoTime'); if (timeEl) timeEl.innerText = dateText;
            
            const infoImageContainer = document.getElementById('infoImageContainer');
            if(infoImageContainer) {
                infoImageContainer.innerHTML = '';
                if (ev.imageUrl) {
                    const img = document.createElement('img'); img.src = ev.imageUrl; img.alt = ev.title; img.className = 'info-image';
                    img.onload = () => { infoImageContainer.innerHTML = ''; infoImageContainer.appendChild(img); };
                    img.onerror = () => { infoImageContainer.innerHTML = `<a class="info-link" href="${ev.imageUrl}" target="_blank" rel="noopener noreferrer">이미지 보기</a>`; };
                    infoImageContainer.appendChild(img);
                }
            }

            const profs = document.getElementById('infoProfiles');
            if (profs) {
                profs.innerHTML = '';
                if (ev.members) {
                    ev.members.split(',').forEach(nameRaw => {
                        const name = nameRaw.trim(); if (!name) return;
                        const m = members[name] || { name, img: `https://placehold.co/100x100?text=${encodeURIComponent(name[0] || '')}` };
                        const card = document.createElement('div'); card.className = 'profile-card';
                        card.innerHTML = `<img src="${m.img}" class="profile-img" onerror="this.src='https://placehold.co/100x100?text=?'"><div class="profile-name">${m.name}</div>`;
                        profs.appendChild(card);
                    });
                }
            }

            let noticePreview = document.getElementById('infoNoticePreview');
            if (!noticePreview) {
                noticePreview = document.createElement('div'); noticePreview.id = 'infoNoticePreview'; noticePreview.className = 'notice-preview'; noticePreview.style.display = 'none';
                const infoBlock = document.querySelector('.info-block'); if(infoBlock) infoBlock.appendChild(noticePreview);
            }
            if (ev.noticeLink) {
                if(window.loadNoticePreview && noticePreview) window.loadNoticePreview(ev.noticeLink, noticePreview, ev.noticeTitle, ev.noticeDesc);
            } else {
                if(noticePreview) noticePreview.style.display = 'none';
            }
            
            const modal = document.getElementById('infoModal'); if(modal) modal.style.display = 'flex';
        }

        async function loadMemos() {
            const list = document.getElementById('memoList'); if(!list) return;
            list.innerHTML = ''; const currentLoad = ++memoLoadToken;
            const snapshot = await getDocs(collection(db, "memos_list"));
            if (currentLoad !== memoLoadToken) return;
            let memos = [];
            snapshot.forEach(docSnap => {
                const data = docSnap.data();
                if (data.tab === activeMemoTab) memos.push({ id: docSnap.id, ...data });
            });

            memos.sort((a, b) => {
                const hasDateTimeA = !!(a.date || a.time); const hasDateTimeB = !!(b.date || b.time);
                if (hasDateTimeA && hasDateTimeB) {
                    const dtA = `${a.date || '9999-12-31'}T${a.time || '23:59'}`;
                    const dtB = `${b.date || '9999-12-31'}T${b.time || '23:59'}`;
                    return dtA.localeCompare(dtB); 
                } else if (hasDateTimeA && !hasDateTimeB) return -1; 
                else if (!hasDateTimeA && hasDateTimeB) return 1;
                else return (b.createdAt?.toMillis() || 0) - (a.createdAt?.toMillis() || 0);
            });
            
            memos.forEach(data => {
                let dateTimeStr = '';
                if (data.date || data.time) {
                    let parts = [];
                    if (data.date) {
                        const dParts = data.date.split('-');
                        if(dParts.length === 3) parts.push(`${dParts[0].slice(-2)}.${dParts[1]}.${dParts[2]}`);
                        else parts.push(data.date);
                    }
                    if (data.time) parts.push(formatTime12h(data.time));
                    dateTimeStr = `<div class="memo-datetime">${parts.join(' ')}</div>`;
                }
                const entry = document.createElement('div'); entry.className = 'memo-item-entry';
                entry.innerHTML = `<div class="memo-content-wrapper">${dateTimeStr}<div class="memo-text-content">${data.text}</div></div>${isAdmin ? `<button class="memo-item-delete" onclick="deleteMemo('${data.id}')">✕</button>` : ''}`;
                list.appendChild(entry);
            });
        }

                    menu.style.display = 'none';

                                ${conditionBadge}
                            </div>
                            <span class="song-artist" style="text-align: left; font-family: 'GMarketSans', sans-serif;">${song.artist}</span>
                        </div>
                        ${isAdmin ? `<button class="song-delete-btn" type="button" onclick="deleteSong('${song.id}')" title="삭제">✕</button>` : ''}
                    </div>
                `;
            });

            const headerDiv = document.querySelector('.songbook-header');
            if (headerDiv) {
                const addBtn = headerDiv.querySelector('.add-song-btn');
                if (isAdmin && !addBtn) {
                    const btn = document.createElement('button'); btn.className = 'add-song-btn'; btn.type = 'button'; btn.textContent = '+';
                    btn.onclick = () => { document.getElementById('adminSongForm').classList.add('visible'); document.getElementById('newSongTitle').focus(); };
                    headerDiv.appendChild(btn);
                } else if (!isAdmin && addBtn) { addBtn.remove(); }
            }

            const favBtn = document.getElementById('favFilterBtn');
            if (favBtn) favBtn.classList.toggle('active', songbookCurrentFilter === 'Favorites');

            const uniqueArtists = [...new Set(songbookSongs.map(s => s.artist))].sort((a, b) => a.localeCompare(b, 'ko', { sensitivity: 'base' }));
            artistListDiv.innerHTML = '';
            const allActive = songbookCurrentFilter === 'All' ? 'active' : '';
            artistListDiv.innerHTML += `<button class="artist-btn ${allActive}" onclick="setSongbookFilter('All')" type="button">All</button>`;
            uniqueArtists.forEach(a => {
                const active = songbookCurrentFilter === a ? 'active' : '';
                artistListDiv.innerHTML += `<button class="artist-btn ${active}" onclick="setSongbookFilter('${a}')" type="button">${a}</button>`;
            });        
        }

        function openBrowser(url, id, title) {
            if(!url) { showToast("등록된 링크가 없습니다."); return; }
            currentModalSongId = id; document.getElementById('browserTitle').innerText = title ? title : 'HTVVI 브라우저';
            document.getElementById('browserModal').classList.add('visible');
            let src = url;
            if (url.includes("sooplive.com/player/")) {
                const match = url.match(/player\/(\d+)/); const videoId = match ? match[1] : url.split('/').pop().split('?')[0];
                src = `https://vod.sooplive.com/player/${videoId}/embed?showChat=false&autoPlay=true&mutePlay=false`;
            } else if (extractYtId(url)) {
                const videoId = extractYtId(url); src = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
            }
            document.getElementById('browserIframe').src = src;
            const btn = document.getElementById('modalFavoriteBtn');
            if(id) { btn.style.display = 'flex'; updateModalFavoriteBtn(); } else { btn.style.display = 'none'; }
        }

        function updateModalFavoriteBtn() {
            if(!currentModalSongId) return;
            const btn = document.getElementById('modalFavoriteBtn'); const favorites = getFavorites();
            const starSolidModal = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path fill-rule="evenodd" d="M10.788 3.21c.448-1.077 1.976-1.077 2.424 0l2.082 5.007 5.404.433c1.164.093 1.636 1.545.749 2.305l-4.117 3.527 1.257 5.273c.271 1.136-.964 2.033-1.96 1.425L12 18.354 7.373 21.18c-.996.608-2.231-.29-1.96-1.425l1.257-5.273-4.117-3.527c-.887-.76-.415-2.212.749-2.305l5.404-.433 2.082-5.006z" clip-rule="evenodd" /></svg>`;
            const starOutlineModal = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="20" height="20"><path stroke-linecap="round" stroke-linejoin="round" d="M11.48 3.499a.562.562 0 011.04 0l2.125 5.111a.563.563 0 00.475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 00-.182.557l1.285 5.385a.562.562 0 01-.84.61l-4.725-2.885a.563.563 0 00-.586 0L6.982 20.54a.562.562 0 01-.84-.61l1.285-5.386a.562.562 0 00-.182-.557l-4.204-3.602a.563.563 0 01.321-.988l5.518-.442a.563.563 0 00.475-.345L11.48 3.5z" /></svg>`;

            if(favorites.includes(currentModalSongId)) { btn.classList.add('active'); btn.innerHTML = `${starSolidModal} 즐겨찾기 해제`; }
            else { btn.classList.remove('active'); btn.innerHTML = `${starOutlineModal} 즐겨찾기 추가`; }
        }

        function toggleModalFavorite() {
            if(!currentModalSongId) return;
            const fakeEvent = { stopPropagation: () => {} };
            toggleFavorite(fakeEvent, currentModalSongId); updateModalFavoriteBtn(); updateFavPlayerPlaylist(); 
        }

        function closeBrowser() {
            document.getElementById('browserModal').classList.remove('visible');
            document.getElementById('browserIframe').src = ''; currentModalSongId = null;
        }

        function editSong(event, id) {
            if (!isAdmin) return true;
            event.preventDefault(); const song = songbookSongs.find(item => item.id === id); if (!song) return false;
            document.getElementById('newSongTitle').value = song.title; document.getElementById('newSongArtist').value = song.artist;
            document.getElementById('newSongUrl').value = song.url; document.getElementById('isConditionSong').checked = song.isConditionSong || false;
            document.getElementById('adminSongForm').classList.add('visible'); songbookIsEditing = id; document.getElementById('addSongBtn').textContent = '수정 저장';
            return false;
        }

        function updateSongbookAdminUI() {
            const form = document.getElementById('adminSongForm'); if (form) form.classList.toggle('visible', isAdmin);
            const addBtn = document.getElementById('addSongBtn'); if (addBtn) addBtn.textContent = '노래 추가';
            renderSongbook();
        }

        async function addSong() {
            const titleInput = document.getElementById('newSongTitle'); const artistInput = document.getElementById('newSongArtist');
            const urlInput = document.getElementById('newSongUrl'); const conditionCheckbox = document.getElementById('isConditionSong');
            
            const title = titleInput.value.trim(); const artist = artistInput.value.trim();
            const url = urlInput.value.trim(); const isConditionSong = conditionCheckbox.checked;
            
            if (!title || !artist) { showToast('노래 제목과 가수명을 입력해주세요.'); return; }
            try {
                if (songbookIsEditing !== null) {
                    await setDoc(doc(db, 'songbook_songs', songbookIsEditing), { title, artist, url, isConditionSong });
                    songbookIsEditing = null;
                } else { await addDoc(collection(db, 'songbook_songs'), { title, artist, url, isConditionSong }); }
                titleInput.value = ''; artistInput.value = ''; urlInput.value = ''; conditionCheckbox.checked = false;
                document.getElementById('addSongBtn').textContent = '노래 추가';
                await loadSongbookSongs(); renderSongbook(); showToast('노래가 저장되었습니다.');
            } catch (error) { console.error('노래 저장 실패:', error); showToast('노래 저장에 실패했습니다.'); }
        }

        function cancelEdit() {
            document.getElementById('newSongTitle').value = ''; document.getElementById('newSongArtist').value = '';
            document.getElementById('newSongUrl').value = ''; document.getElementById('isConditionSong').checked = false;
            songbookIsEditing = null; document.getElementById('addSongBtn').textContent = '노래 추가';
        }

        async function deleteSong(id) {
            if (!isAdmin) return;
            if (!confirm('이 노래를 삭제하시겠습니까?')) return;
            try { await deleteDoc(doc(db, 'songbook_songs', id)); await loadSongbookSongs(); renderSongbook(); showToast('노래가 삭제되었습니다.'); }
            catch (error) { console.error('노래 삭제 실패:', error); showToast('노래 삭제에 실패했습니다.'); }
        }

        window.setSongbookFilter = function(filter) {
            const favBtn = document.getElementById('favFilterBtn');
            if (songbookCurrentFilter === filter && filter !== 'All') {
                songbookCurrentFilter = 'All'; if (favBtn) favBtn.classList.remove('active');
            } else {
                songbookCurrentFilter = filter;
                if (favBtn) {
                    if (filter === 'Favorites') favBtn.classList.add('active');
                    else favBtn.classList.remove('active');
                }
            }
            renderSongbook();
        }

        window.showTab = async function(tab) {
            document.querySelectorAll('.nav-tab').forEach(btn => btn.classList.toggle('active', btn.dataset.tab === tab));
            const calendarTop = document.querySelector('.calendar-top'); const calendarBody = document.querySelector('.calendar-body');
            const songbookSection = document.getElementById('songbookSection'); const todaySchedulePanel = document.getElementById('todaySchedulePanel');

            if (tab === 'songbook') {
                if(calendarTop) calendarTop.style.display = 'none';
                if(calendarBody) calendarBody.style.display = 'none';
                if(songbookSection) songbookSection.classList.add('visible');
                if(todaySchedulePanel) todaySchedulePanel.style.display = 'none';
                
                if (!isSongbookLoaded) {
                    const loadingOverlay = document.getElementById('songbookLoading');
                    if (loadingOverlay) loadingOverlay.classList.remove('hidden');
                    await loadSongbookSongs(); isSongbookLoaded = true;
                    if (loadingOverlay) setTimeout(() => { loadingOverlay.classList.add('hidden'); }, 500);
                }
                renderSongbook(); updateFavPlayerPlaylist(); window.location.hash = '#songbook';
            } else {
                if(calendarTop) calendarTop.style.display = 'flex';
                if(calendarBody) calendarBody.style.display = 'flex';
                if(songbookSection) songbookSection.classList.remove('visible');
                if(todaySchedulePanel) todaySchedulePanel.style.display = 'block';
                await ensureMonthsLoadedForDate(currentDate); renderCalendar(); window.location.hash = '#schedule';
            }
        }

        function handlePlayerPosition() {
            const playerPanel = document.getElementById('favoritePlayerPanel');
            const sidebar = document.querySelector('.songbook-sidebar');
            if (!playerPanel || !sidebar) return;

            if (window.innerWidth <= 768) {
                if (playerPanel.parentElement !== document.body) document.body.appendChild(playerPanel);
            } else {
                if (playerPanel.parentElement !== sidebar) { sidebar.insertBefore(playerPanel, sidebar.firstChild); playerPanel.classList.remove('show-sheet'); }
            }
        }

        window.toggleMobileMenu = function() {
            const container = document.getElementById('mobileMenuContainer'); const iconDefault = document.getElementById('menuIconDefault'); const iconClose = document.getElementById('menuIconClose');
            if (!container) return;
            container.classList.toggle('open');
            if (iconDefault && iconClose) {
                iconDefault.style.display = container.classList.contains('open') ? 'none' : 'block';
                iconClose.style.display = container.classList.contains('open') ? 'block' : 'none';
            }
        };

        window.handleMobileTab = function(tab) { window.showTab(tab); window.toggleMobileMenu(); };
        window.toggleMobilePlayer = function() {
            const playerPanel = document.getElementById('favoritePlayerPanel'); if (playerPanel) playerPanel.classList.toggle('show-sheet');
            window.toggleMobileMenu();
        };

        window.toggleMobileMemo = function() {
            const memoPanel = document.getElementById('memoPanel'); const upPanel = document.getElementById('upPanel');
            if (upPanel) upPanel.classList.remove('show-sheet');
            if (memoPanel) {
                memoPanel.classList.toggle('show-sheet');
                if (memoPanel.classList.contains('show-sheet')) { updateMemoTabUI(); loadMemos(); }
            }
            const container = document.getElementById('mobileMenuContainer'); if (container && container.classList.contains('open')) window.toggleMobileMenu();
            updateBoardButtonsState();
        };

        window.toggleMobileUpBoard = function() {
            const memoPanel = document.getElementById('memoPanel'); const upPanel = document.getElementById('upPanel');
            if (memoPanel) memoPanel.classList.remove('show-sheet');
            if (upPanel) {
                upPanel.classList.toggle('show-sheet');
                if (upPanel.classList.contains('show-sheet')) loadUpItems();
            }
            const container = document.getElementById('mobileMenuContainer'); if (container && container.classList.contains('open')) window.toggleMobileMenu();
            updateBoardButtonsState();
        };

        Object.assign(window, {
            handleEventImgUpload, addMember, deleteMember,
            openMemberManager, renderMemberList, showToast, closeModal, formatTime12h,
            setAMPM, openAddModal, openEditModal, saveEvent, deleteEvent, showInfo,
            toggleMemo, openMemoInput, closeMemoInput, saveMemoItem, selectMemoTab, openMonthPicker, changePickerYear,
            toggleUpBoard, toggleMobileUpBoard, loadUpItems, deleteUpItem,
            promptAdmin, loginAdmin, showAdminMenu, openAdminSettings, savePopupImage, saveUpItem,
            renderSongbook, openBrowser, closeBrowser,
            editSong, addSong, cancelEdit, deleteSong, setSongbookFilter,
            updateSongbookAdminUI, toggleFavorite, toggleModalFavorite,
            toggleMobileMenu, handleMobileTab, toggleMobilePlayer, toggleMobileMemo,
            closeUpPopup, checkAndShowPopup
        });

        window.onload = async () => {
            injectDynamicStyles(); 
            await loadData();
            updateAdminUI(); 
            handlePlayerPosition();
            
            const initialTab = window.location.hash === '#songbook' ? 'songbook' : 'schedule';
            await window.showTab(initialTab);

            const btnMin = document.getElementById('btnMin');
            if(btnMin) btnMin.innerHTML = `<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>`;
            
            window.checkAndShowPopup();

            let lastWidth = window.innerWidth;
            window.addEventListener('resize', () => {
                if (window.innerWidth !== lastWidth) {
                    lastWidth = window.innerWidth;
                    if (window.location.hash !== '#songbook') renderCalendar();
                    handlePlayerPosition();
                }
            });

            setTimeout(() => {
                const loadingOverlay = document.getElementById('loadingOverlay');
                if (loadingOverlay) { loadingOverlay.classList.add('hidden'); setTimeout(() => { loadingOverlay.remove(); }, 500); }
            }, 1000);
        };
    </script>
</body>
</html>
