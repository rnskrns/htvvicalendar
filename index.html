    <script>
        (async function() {
            const gifs = [
                "https://i.postimg.cc/hGw3vK6n/Honeycam-2026-06-23-20-22-49.webp",
                "https://i.postimg.cc/DzDY07HK/Honeycam-2026-06-23-20-24-11.webp",
                "https://i.postimg.cc/jj9k2Rmb/Honeycam-2026-06-23-20-25-21.webp"
            ];
            const pickedGif = gifs[Math.floor(Math.random() * gifs.length)];
            const imgTarget = document.getElementById('randomLoadingImg');
            
            imgTarget.onload = function() {
                imgTarget.style.opacity = '1';
            };

            try {
                const cache = await caches.open('loading-images');
                const cachedResponse = await cache.match(pickedGif);

                if (cachedResponse) {
                    const blob = await cachedResponse.blob();
                    imgTarget.src = URL.createObjectURL(blob);
                } else {
                    const response = await fetch(pickedGif);
                    if (response.ok) {
                        cache.put(pickedGif, response.clone());
                        const blob = await response.blob();
                        imgTarget.src = URL.createObjectURL(blob);
                    } else {
                        imgTarget.src = pickedGif;
                    }
                }
            } catch (error) {
                console.warn("캐시 로드 실패, 기본 URL을 사용합니다:", error);
                imgTarget.src = pickedGif;
            }
        })();
    </script>

                <p id="pwError" class="pw-error hidden">로그인 정보가 올바르지 않습니다.</p>
            </div>
            
            <div class="btn-group" style="margin-top: 20px;">
                <button class="btn btn-cancel" onclick="closeModal('pwModal')">취소</button>
                <button class="btn btn-save" onclick="loginAdmin()">로그인</button>
            </div>
        </div>
    </div>

    <div id="pwChangeModal" class="modal">
        <div class="modal-content pw-modal" style="max-width: 400px;">
            
            <div class="btn-group" style="margin-top: 20px;">
                <button class="btn btn-cancel" onclick="closeModal('pwChangeModal')">취소</button>
                <button class="btn btn-save" onclick="changeAdminPassword()">변경</button>
            </div>
        </div>
    </div>
    
    <div id="memberModal" class="modal">
        <div class="modal-content" style="max-width: 520px;">
            <h3 class="modal-title">멤버 관리</h3>
            <div style="position:relative; margin-bottom:14px;">
                <input type="text" id="memberSearchInput" class="admin-input" placeholder="🔍 멤버 검색..." oninput="filterMemberList()" style="margin-bottom:0;">
            </div>
            <div id="memberList" class="member-list" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 15px; margin-top: 10px; max-height:280px; overflow-y:auto;"></div>
            <div class="member-add-box">
                <h4 style="font-weight:900; margin-bottom:12px;">새 멤버 추가</h4>
                <input type="text" id="newMemberName" class="admin-input" placeholder="멤버 이름 (닉네임)" style="margin-bottom: 8px;">
                <input type="text" id="newMemberId" class="admin-input" placeholder="SOOP 아이디" style="margin-bottom: 12px;">
                <input type="hidden" id="newMemberImg">
                <button class="btn btn-save" style="width:100%; padding:14px;" onclick="addMember()">추가하기</button>
            </div>
            <div style="display:flex; gap:10px; margin-top:15px;">
                <button class="btn btn-save" style="flex:1; background:#E8F4FD; color:#1a6ba0; border:1.5px solid #b3d9f5;" onclick="openGroupModal()">👥 그룹 관리</button>
                <button class="btn btn-cancel" style="flex:1;" onclick="closeModal('memberModal')">닫기</button>
            </div>
        </div>
    </div>

    <!-- 그룹 관리 모달 -->
    <div id="groupModal" class="modal">
        <div class="modal-content" style="max-width: 520px;">
            <h3 class="modal-title">그룹 관리</h3>
            <div id="groupList" style="margin-bottom:16px;"></div>
            <div class="member-add-box">
                <h4 style="font-weight:900; margin-bottom:12px;">새 그룹 추가</h4>
                <input type="text" id="newGroupName" class="admin-input" placeholder="그룹 이름 (예: 합방팀A)" style="margin-bottom:12px;">
                <div style="position:relative; margin-bottom:8px;">
                    <input type="text" id="groupMemberSearch" class="admin-input" placeholder="🔍 멤버 검색..." oninput="filterGroupMemberPicker()" style="margin-bottom:0;">
                </div>
                <div id="groupMemberPicker" style="display:flex; flex-wrap:wrap; gap:8px; max-height:180px; overflow-y:auto; padding:10px; background:#fafaf9; border:1px solid #e5e7eb; border-radius:10px; margin-bottom:12px;"></div>
                <div id="groupSelectedPreview" style="font-size:13px; color:#7A5A2F; font-weight:700; margin-bottom:12px; min-height:18px;"></div>
                <button id="groupSaveBtn" class="btn btn-save" style="width:100%; padding:14px;" onclick="saveGroup()">그룹 저장</button>
                <button id="groupCancelEditBtn" class="btn btn-cancel" style="width:100%; padding:10px; margin-top:8px; display:none;" onclick="cancelGroupEdit()">수정 취소</button>
            </div>
            <div style="display:flex; gap:10px; margin-top:15px;">
                <button class="btn btn-cancel" style="flex:1;" onclick="closeModal('groupModal')">닫기</button>
            </div>
        </div>
    </div>
    
    <div id="confirmModal" class="modal"><div class="modal-content" style="max-width: 320px; align-items: center; text-align: center;"><h3 id="confirmMessage" class="font-black text-lg mb-6"></h3><div class="btn-group" style="width: 100%;"><button class="btn btn-cancel" onclick="closeModal('confirmModal')">취소</button><button id="confirmBtn" class="btn btn-danger">삭제</button></div></div></div>
    
    <div id="monthPickerModal" class="modal"><div class="modal-content" style="max-width: 380px;"><div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;"><button class="nav-btn" onclick="changePickerYear(-1)">◀</button><h3 id="pickerYearDisplay" class="font-black text-2xl m-0"></h3><button class="nav-btn" onclick="changePickerYear(1)">▶</button></div><div class="month-picker-grid" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;"></div><button class="btn btn-cancel mt-6" onclick="closeModal('monthPickerModal')">닫기</button></div></div>

    <nav class="mobile-bottom-nav">
        <button class="nav-item" onclick="toggleMobileUpBoard()">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12l1.41 1.41L11 7.83V20h2V7.83l5.58 5.59L20 12l-8-8-8 8z"/></svg>
            <span>UP!</span>
        </button>
        <button class="nav-item" onclick="toggleMobileMemo()">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line></svg>
            <span>메모</span>
        </button>
    </nav>

    <div id="entryPopupModal" style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.6); z-index:9999999; justify-content:center; align-items:center; backdrop-filter:blur(4px);">
        <div style="background:#fff; width:90%; max-width:450px; padding:30px; border-radius:30px; box-shadow:0 10px 25px rgba(0,0,0,0.2); display:flex; flex-direction:column; max-height: 80vh;">
            <div id="entryPopupList" style="overflow-y:auto; flex:1; padding-right:5px; margin-bottom: 15px; display:flex; flex-direction:column; gap: 10px;">
                </div>
            <div style="text-align: center; padding-top: 15px; border-top: 1px dashed #e2e8f0; flex-shrink:0;">
                <button style="padding: 10px 24px; font-size: 15px; background: #ffc595; color: white; border: none; border-radius: 30px; font-weight: 800; cursor: pointer;" onclick="document.getElementById('entryPopupModal').style.display='none'">닫기</button>
            </div>
        </div>
    </div>

    <div id="toastMessage"></div>
<script type="module" src="script.js"></script>
</body>
</html>
